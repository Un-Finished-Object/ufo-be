name: UFO Backend CI/CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 push 될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # GitHub 코드 가져오기
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # JDK 21 세팅
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

		# 보안 설정 파일 2개 동적 생성 (application-prod.yml, application-secret.yml)
    - name: Make application-secret.yml and application-prod.yml
      run: |
        mkdir -p src/main/resources
        
        echo "${{ secrets.APPLICATION_PROD }}" > src/main/resources/application-prod.yml
        echo "${{ secrets.APPLICATION_SECRET }}" > src/main/resources/application-secret.yml
 
    # Gradle 실행 권한 부여 및 빌드
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew clean build -x test

    # Docker Hub 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Docker 이미지 빌드 및 푸시
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ufo-backend:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/ufo-backend:latest

    # EC2에 접속하여 배포 스크립트 실행
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # EC2 내부의 작업 폴더로 이동
          cd /home/ubuntu/ufo-backend
          
          # 도커 허브에서 최신 이미지 다운로드
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ufo-backend:latest
          
          # 기존 실행 중인 컨테이너 종료 및 삭제, 새 이미지로 실행
          sudo docker compose down
          sudo docker compose up -d
          
          # 안 쓰는 찌꺼기 이미지 삭제 (용량 확보)
          sudo docker image prune -f
