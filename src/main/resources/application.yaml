spring:
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

app:
  image:
    max-file-count: 5
    max-bytes: 10485760
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    s3:
      bucket: ${S3_IMAGE_BUCKET:}
      region: ${S3_REGION:ap-northeast-2}
      url-expiration-minutes: 5
      public-base-url: ${S3_PUBLIC_BASE_URL:}
