spring:
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  forward-headers-strategy: framework

app:
  chat:
    segment-days: 7
  oauth:
    redirect-url: ${OAUTH_REDIRECT_URL:}
    cookie-domain: ${OAUTH_COOKIE_DOMAIN:}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - ${DOMAIN_URL:}
  image:
    max-file-count: 5
    max-bytes: 10485760
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    s3:
      bucket: ${S3_IMAGE_BUCKET:}
      region: ${S3_REGION:ap-northeast-2}
      url-expiration-minutes: 5
      public-base-url: ${S3_PUBLIC_BASE_URL:}
