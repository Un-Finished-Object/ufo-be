services:
  backend-server:
    build:
      context: .
    image: ufo-backend:local
    container_name: ufo-backend
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8080}:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE:-ufo}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      SPRING_JWT_SECRET: ${SPRING_JWT_SECRET:?SPRING_JWT_SECRET is required}
      SPRING_JWT_ACCESS_TOKEN_EXPIRE: ${SPRING_JWT_ACCESS_TOKEN_EXPIRE:-7200000}
      SPRING_JWT_REFRESH_TOKEN_EXPIRE: ${SPRING_JWT_REFRESH_TOKEN_EXPIRE:-1209600000}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:?Google client ID is required}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:?Google client secret is required}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID:?Kakao client ID is required}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET:?Kakao client secret is required}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID:?Naver client ID is required}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET:?Naver client secret is required}
      DOMAIN_URL: ${DOMAIN_URL:-http://localhost:3000}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-http://localhost:3000/auth/callback}
      OAUTH_SIGNUP_REDIRECT_URL: ${OAUTH_SIGNUP_REDIRECT_URL:-http://localhost:3000/auth/signup}
      OAUTH_COOKIE_DOMAIN: ${OAUTH_COOKIE_DOMAIN:-localhost}
      S3_IMAGE_BUCKET: ${S3_IMAGE_BUCKET:?S3 image bucket is required}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?S3 public base URL is required}
      CDN_BASE_URL: ${CDN_BASE_URL:?CDN base URL is required}
      DEFAULT_PROFILE_IMAGE_KEY: ${DEFAULT_PROFILE_IMAGE_KEY:-defaults/profile.png}
      REFERRAL_HMAC_SECRET: ${REFERRAL_HMAC_SECRET:?Referral HMAC secret is required}
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  mysql-db:
    image: mysql:8.4
    container_name: ufo-mysql
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ufo}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - ufo-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  ufo-mysql-data:
